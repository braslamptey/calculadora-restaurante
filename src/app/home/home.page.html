<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Gorjeta Pro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="main-container">
    <ion-card class="input-card">
      <ion-card-content>
        <div class="input-group">
          <ion-label>Valor Total (Kz)</ion-label>
          <div class="custom-input-box">
            <span class="currency">Kz</span>
            <ion-input 
              type="number" 
              inputmode="decimal" 
              placeholder="0.00" 
              [(ngModel)]="valorConta" 
              (ionInput)="calcular()">
            </ion-input>
          </div>
        </div>

        <div class="tip-section">
          <ion-label>Quanto quer dar de gorjeta?</ion-label>
          <div class="button-grid">
            <button [class.active]="porcentagem === 10" (click)="setPorcentagem(10)">10%</button>
            <button [class.active]="porcentagem === 15" (click)="setPorcentagem(15)">15%</button>
            <button [class.active]="porcentagem === 20" (click)="setPorcentagem(20)">20%</button>
          </div>
        </div>

        <div class="split-section">
          <ion-label>Dividir conta por:</ion-label>
          <div class="stepper">
            <button (click)="decrementarPessoas()" [disabled]="numPessoas <= 1">-</button>
            <span>{{ numPessoas }} {{ numPessoas > 1 ? 'pessoas' : 'pessoa' }}</span>
            <button (click)="incrementarPessoas()">+</button>
          </div>
        </div>
      </ion-card-content>
    </ion-card>

    <div class="results-container" *ngIf="valorConta > 0">
      <div class="result-row">
        <span>Gorjeta:</span>
        <span class="val">Kz {{ gorjetaTotal | number:'1.2-2' }}</span>
      </div>
      <div class="result-row total">
        <span>Total Geral:</span>
        <span class="val">Kz {{ totalGeral | number:'1.2-2' }}</span>
      </div>
      
      <div class="per-person-box" *ngIf="numPessoas > 1">
        <small>CADA UM PAGA</small>
        <h2>Kz {{ totalPorPessoa | number:'1.2-2' }}</h2>
      </div>
    </div>
  </div>
</ion-content>
